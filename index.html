<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мини-чат</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.own {
            background: #dcf8c5;
            align-self: flex-end;
            margin-left: auto;
        }
        .message.other {
            background: white;
            align-self: flex-start;
        }
        .message strong {
            color: #0066cc;
        }
        .system {
            background: #e0e0e0;
            color: #555;
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            align-self: center;
            max-width: 80%;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            align-self: center;
        }
        .panel {
            background: white;
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        #message {
            flex: 2;
        }
        #nickInput {
            flex: 1;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #004999;
        }
        #nickInfo {
            background: #e8f0fe;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #0066cc;
            text-align: center;
        }
        .panel-top {
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nick-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #changeNickBtn {
            background: #4caf50;
            padding: 6px 12px;
            font-size: 12px;
        }
        #changeNickBtn:hover {
            background: #45a049;
        }
        #nickInput {
            padding: 6px 12px;
            font-size: 14px;
            width: 120px;
        }
        .hint {
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="panel-top">
        <span>💬 Мини-чат</span>
        <div class="nick-control">
            <input type="text" id="nickInput" placeholder="Новый ник" maxlength="20">
            <button id="changeNickBtn">Сменить ник</button>
            <span id="nickInfo">Подключение...</span>
        </div>
    </div>
    <div id="chat"></div>
    <div class="panel">
        <input type="text" id="message" placeholder="Сообщение" autocomplete="off">
        <button id="send">Отправить</button>
    </div>
    <div class="hint" style="padding: 4px 12px;">💡 Команда: /nick НовоеИмя — сменить никнейм</div>

    <script>
        const WS_URL = "wss://chat-test-gb86.onrender.com";

        let ws = null;
        let currentNick = "";

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => console.log("Соединено");
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'init') {
                        currentNick = data.nick;
                        document.getElementById('nickInfo').innerText = currentNick;
                    } 
                    else if (data.type === 'message') {
                        const isOwn = (data.nick === currentNick);
                        addMessage(data.nick, data.text, isOwn);
                    }
                    else if (data.type === 'system') {
                        addSystemMessage(data.text);
                    }
                    else if (data.type === 'error') {
                        addErrorMessage(data.text);
                    }
                    else if (data.type === 'nick_changed') {
                        currentNick = data.nick;
                        document.getElementById('nickInfo').innerText = currentNick;
                        addSystemMessage(`Вы теперь ${currentNick}`);
                    }
                } catch(e) {
                    console.error(e);
                }
            };
            ws.onclose = () => {
                console.log("Отключено, переподключение через 3с");
                setTimeout(connect, 3000);
            };
        }

        function addMessage(nick, text, isOwn) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
            msgDiv.innerHTML = `<strong>${escapeHtml(nick)}</strong>: ${escapeHtml(text)}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system';
            msgDiv.innerText = text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function addErrorMessage(text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'error';
            msgDiv.innerText = '⚠️ ' + text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function changeNick() {
            const newNick = document.getElementById('nickInput').value.trim();
            if (!newNick) {
                addErrorMessage("Введите новый ник");
                return;
            }
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addErrorMessage("Нет соединения с сервером");
                return;
            }
            ws.send(JSON.stringify({ type: 'nick', nick: newNick }));
            document.getElementById('nickInput').value = '';
        }

        function sendMessage() {
            let text = document.getElementById('message').value.trim();
            if (!text) return;

            // Проверка на команду /nick
            if (text.startsWith('/nick ')) {
                const newNick = text.slice(6).trim();
                if (newNick) {
                    changeNickManual(newNick);
                }
                document.getElementById('message').value = '';
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addErrorMessage("Сервер ещё не подключён");
                return;
            }

            ws.send(JSON.stringify({ text }));
            document.getElementById('message').value = '';
        }

        function changeNickManual(newNick) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addErrorMessage("Нет соединения с сервером");
                return;
            }
            ws.send(JSON.stringify({ type: 'nick', nick: newNick }));
        }

        document.getElementById('send').onclick = sendMessage;
        document.getElementById('changeNickBtn').onclick = changeNick;
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('nickInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeNick();
        });

        connect();
    </script>
</body>
</html>
