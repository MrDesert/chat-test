<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мини-чат</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.own {
            background: #dcf8c5;
            align-self: flex-end;
            margin-left: auto;
        }
        .message.other {
            background: white;
            align-self: flex-start;
        }
        .message strong {
            color: #0066cc;
        }
        .info {
            background: #e0e0e0;
            color: #555;
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            align-self: center;
        }
        .panel {
            background: white;
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        #message {
            flex: 1;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #004999;
        }
        #nickInfo {
            background: #e8f0fe;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #0066cc;
            text-align: center;
        }
        .panel-top {
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="panel-top">
        <span>💬 Мини-чат</span>
        <span id="nickInfo">Подключение...</span>
    </div>
    <div id="chat"></div>
    <div class="panel">
        <input type="text" id="message" placeholder="Сообщение" autocomplete="off">
        <button id="send">Отправить</button>
    </div>

    <script>
        const WS_URL = "wss://chat-test-gb86.onrender.com";

        let ws = null;
        let currentNick = "";

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => console.log("Соединено");
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'init') {
                        currentNick = data.nick;
                        document.getElementById('nickInfo').innerText = `Вы: ${currentNick}`;
                    } else if (data.type === 'message') {
                        const isOwn = (data.nick === currentNick);
                        addMessage(data.nick, data.text, isOwn);
                    }
                } catch(e) {}
            };
            ws.onclose = () => {
                console.log("Отключено, переподключение через 3с");
                setTimeout(connect, 3000);
            };
        }

        function addMessage(nick, text, isOwn) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
            msgDiv.innerHTML = `<strong>${escapeHtml(nick)}</strong>: ${escapeHtml(text)}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'info';
            msgDiv.innerText = text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function sendMessage() {
            const text = document.getElementById('message').value.trim();
            if (!text) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Сервер ещё не подключён");
                return;
            }

            ws.send(JSON.stringify({ text }));
            document.getElementById('message').value = '';
        }

        document.getElementById('send').onclick = sendMessage;
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        connect();
    </script>
</body>
</html>
