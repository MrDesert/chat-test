<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мини-чат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-main">
        <div class="panel-top">
            <div class="chat-header">
                <span id="currentChatTitle">💬 Общий чат</span>
                <button id="closeChatBtn" class="close-chat" style="display: none;">✕</button>
            </div>
            <div class="nick-control">
                <input type="text" id="nickInput" placeholder="Новый ник" maxlength="20">
                <button id="changeNickBtn">Сменить</button>
                <span id="nickInfo">Подключение...</span>
            </div>
        </div>
        <div id="chat" class="chat-messages">
            <div class="placeholder">💬 Напишите первое сообщение в общий чат</div>
        </div>
        <div class="panel">
            < class="panel-input-area">
            <div class="emoji-picker-container">
                <button id="emojiBtn" class="emoji-btn">😊</button>
                <div id="emojiPicker" class="emoji-picker hidden">
                    <div class="emoji-grid">
                        <span class="emoji">😀</span><span class="emoji">😃</span><span class="emoji">😄</span><span class="emoji">😁</span>
                        <span class="emoji">😅</span><span class="emoji">😂</span><span class="emoji">🤣</span><span class="emoji">😊</span>
                        <span class="emoji">😇</span><span class="emoji">🙂</span><span class="emoji">🙃</span><span class="emoji">😉</span>
                        <span class="emoji">😍</span><span class="emoji">🥰</span><span class="emoji">😘</span><span class="emoji">😗</span>
                        <span class="emoji">😋</span><span class="emoji">😛</span><span class="emoji">😝</span><span class="emoji">😜</span>
                        <span class="emoji">🤪</span><span class="emoji">🤓</span><span class="emoji">😎</span><span class="emoji">🤩</span>
                        <span class="emoji">🥳</span><span class="emoji">😏</span><span class="emoji">😞</span><span class="emoji">😔</span>
                        <span class="emoji">😢</span><span class="emoji">😭</span><span class="emoji">😤</span><span class="emoji">😡</span>
                        <span class="emoji">🤬</span><span class="emoji">🤯</span><span class="emoji">😳</span><span class="emoji">🥵</span>
                        <span class="emoji">❤️</span><span class="emoji">🧡</span><span class="emoji">💛</span><span class="emoji">💚</span>
                        <span class="emoji">💙</span><span class="emoji">💜</span><span class="emoji">🖤</span><span class="emoji">🤍</span>
                        <span class="emoji">💔</span><span class="emoji">💕</span><span class="emoji">💞</span><span class="emoji">💓</span>
                        <span class="emoji">👍</span><span class="emoji">🔥</span><span class="emoji">✨</span><span class="emoji">⭐</span>
                        <span class="emoji">🌟</span><span class="emoji">💀</span><span class="emoji">🎉</span><span class="emoji">🎊</span>
                    </div>
                </div>
            </div>
            <label for="fileInput" class="file-btn">📎</label>
            <input type="text" id="message" placeholder="Сообщение" autocomplete="off">
            <button id="send">Отправить</button>
            </div>
            <div id="imagePreviewContainer" class="image-preview-container"></div>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            👥 Онлайн
            <div class="online-count" id="onlineCount">0 человек</div>
        </div>
        <div class="user-list" id="userList">
            <div style="padding: 16px; color: #888; text-align: center;">Загрузка...</div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>
    <script src="script.js"></script>
</body>
    <footer style="z-index: 4;">© MrDesert - v0.0.0.2.4</footer>
</html>
