<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мини-чат</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            background: #f5f5f5;
        }
        
        /* Основная область чата */
        .chat-main {
            flex: 3;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Боковая панель с онлайн-пользователями */
        .sidebar {
            width: 250px;
            background: white;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #ddd;
            background: #fafafa;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        
        .online-count {
            color: #4caf50;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .user-list {
            flex: 1;
            padding: 8px 0;
        }
        
        .user-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        .user-item .status {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }
        
        .user-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-item.current {
            background: #e8f0fe;
            font-weight: 500;
        }
        
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message-wrapper.own {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message {
            padding: 8px 12px;
            border-radius: 12px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.own {
            background: #dcf8c5;
        }
        .message.other {
            background: white;
        }
        .message strong {
            color: #0066cc;
        }
        .timestamp {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
            margin-left: 8px;
            margin-right: 8px;
        }
        .system {
            background: #e0e0e0;
            color: #555;
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            align-self: center;
            max-width: 80%;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            text-align: center;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            align-self: center;
        }
        .panel {
            background: white;
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        #message {
            flex: 1;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #004999;
        }
        #nickInfo {
            background: #e8f0fe;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #0066cc;
        }
        .panel-top {
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nick-control {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        #changeNickBtn {
            background: #4caf50;
            padding: 6px 12px;
            font-size: 12px;
        }
        #changeNickBtn:hover {
            background: #45a049;
        }
        #nickInput {
            padding: 6px 12px;
            font-size: 14px;
            width: 120px;
        }
        .hint {
            font-size: 11px;
            color: #888;
            padding: 4px 12px;
        }
        
        @media (max-width: 600px) {
            .sidebar {
                width: 180px;
            }
            .nick-control {
                flex-wrap: wrap;
            }
            #nickInput {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-main">
        <div class="panel-top">
            <span>💬 Мини-чат</span>
            <div class="nick-control">
                <input type="text" id="nickInput" placeholder="Новый ник" maxlength="20">
                <button id="changeNickBtn">Сменить</button>
                <span id="nickInfo">Подключение...</span>
            </div>
        </div>
        <div id="chat"></div>
        <div class="panel">
            <input type="text" id="message" placeholder="Сообщение" autocomplete="off">
            <button id="send">Отправить</button>
        </div>
        <div class="hint">💡 Команда: /nick НовоеИмя — сменить никнейм</div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            👥 Онлайн
            <div class="online-count" id="onlineCount">0 человек</div>
        </div>
        <div class="user-list" id="userList">
            <div style="padding: 16px; color: #888; text-align: center;">Загрузка...</div>
        </div>
    </div>

    <script>
        const WS_URL = "wss://chat-test-gb86.onrender.com";

        let ws = null;
        let currentNick = "";
        let messagesList = [];
        let updateInterval = null;
        let msgCounter = 0;

        function formatTimestamp(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            
            if (seconds < 10) return "только что";
            if (seconds < 60) return `${seconds} сек назад`;
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 2) return `${hours} час назад`;
            
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function updateAllTimestamps() {
            messagesList.forEach(item => {
                const timestampEl = document.getElementById(`ts-${item.id}`);
                if (timestampEl) {
                    const newText = formatTimestamp(item.timestamp);
                    if (timestampEl.innerText !== newText) {
                        timestampEl.innerText = newText;
                    }
                }
            });
        }

        function startTimestampUpdater() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateAllTimestamps, 60000);
        }

        function addMessage(nick, text, isOwn, timestamp, msgId) {
            const chatDiv = document.getElementById('chat');
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ' + (isOwn ? 'own' : 'other');
            wrapper.id = `msg-${msgId}`;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isOwn ? 'own' : 'other');
            messageDiv.innerHTML = `<strong>${escapeHtml(nick)}</strong>: ${escapeHtml(text)}`;
            
            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'timestamp';
            timestampDiv.id = `ts-${msgId}`;
            timestampDiv.innerText = formatTimestamp(timestamp);
            
            wrapper.appendChild(messageDiv);
            wrapper.appendChild(timestampDiv);
            chatDiv.appendChild(wrapper);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            messagesList.push({ id: msgId, timestamp });
        }

        function updateUserList(users) {
            const userListDiv = document.getElementById('userList');
            const count = users.length;
            document.getElementById('onlineCount').innerText = `${count} ${count === 1 ? 'человек' : 'человек'}`;
            
            if (users.length === 0) {
                userListDiv.innerHTML = '<div style="padding: 16px; color: #888; text-align: center;">Никого нет</div>';
                return;
            }
            
            userListDiv.innerHTML = users.map(name => `
                <div class="user-item ${name === currentNick ? 'current' : ''}">
                    <span class="status"></span>
                    <span class="name">${escapeHtml(name)}</span>
                    ${name === currentNick ? '<span style="font-size: 10px; color: #888;">(вы)</span>' : ''}
                </div>
            `).join('');
        }

        function addSystemMessage(text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system';
            msgDiv.innerText = text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function addErrorMessage(text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'error';
            msgDiv.innerText = '⚠️ ' + text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => console.log("Соединено");
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'init') {
                        currentNick = data.nick;
                        document.getElementById('nickInfo').innerText = currentNick;
                    } 
                    else if (data.type === 'message') {
                        const isOwn = (data.nick === currentNick);
                        const msgId = msgCounter++;
                        addMessage(data.nick, data.text, isOwn, data.timestamp, msgId);
                    }
                    else if (data.type === 'system') {
                        addSystemMessage(data.text);
                    }
                    else if (data.type === 'error') {
                        addErrorMessage(data.text);
                    }
                    else if (data.type === 'nick_changed') {
                        currentNick = data.nick;
                        document.getElementById('nickInfo').innerText = currentNick;
                        addSystemMessage(`Вы теперь ${currentNick}`);
                    }
                    else if (data.type === 'user_list') {
                        updateUserList(data.users);
                    }
                } catch(e) {
                    console.error(e);
                }
            };
            ws.onclose = () => {
                console.log("Отключено, переподключение через 3с");
                setTimeout(connect, 3000);
            };
        }

        function changeNick() {
            const newNick = document.getElementById('nickInput').value.trim();
            if (!newNick) {
                addErrorMessage("Введите новый ник");
                return;
            }
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addErrorMessage("Нет соединения с сервером");
                return;
            }
            ws.send(JSON.stringify({ type: 'nick', nick: newNick }));
            document.getElementById('nickInput').value = '';
        }

        function sendMessage() {
            let text = document.getElementById('message').value.trim();
            if (!text) return;

            if (text.startsWith('/nick ')) {
                const newNick = text.slice(6).trim();
                if (newNick) {
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        addErrorMessage("Нет соединения с сервером");
                        return;
                    }
                    ws.send(JSON.stringify({ type: 'nick', nick: newNick }));
                }
                document.getElementById('message').value = '';
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addErrorMessage("Сервер ещё не подключён");
                return;
            }

            ws.send(JSON.stringify({ text }));
            document.getElementById('message').value = '';
        }

        document.getElementById('send').onclick = sendMessage;
        document.getElementById('changeNickBtn').onclick = changeNick;
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('nickInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') changeNick();
        });

        connect();
        startTimestampUpdater();
    </script>
</body>
</html>
