<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мини-чат</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            background: white;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message strong {
            color: #0066cc;
        }
        .panel {
            background: white;
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        input {
            flex: 2;
        }
        #nick {
            flex: 1;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #004999;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="panel">
        <input type="text" id="nick" placeholder="Никнейм" value="Гость">
        <input type="text" id="message" placeholder="Сообщение" autocomplete="off">
        <button id="send">Отправить</button>
    </div>

    <script>
        // ПОДСТАВЬ СВОЙ URL ОТ RENDER
        const WS_URL = "wss://твой-чат.onrender.com";

        let ws = null;

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => console.log("Соединено");
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addMessage(data.nick, data.text);
                } catch(e) {}
            };
            ws.onclose = () => {
                console.log("Отключено, переподключение через 3с");
                setTimeout(connect, 3000);
            };
        }

        function addMessage(nick, text) {
            const chatDiv = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<strong>${escapeHtml(nick)}</strong>: ${escapeHtml(text)}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function sendMessage() {
            const nick = document.getElementById('nick').value.trim() || "Без имени";
            const text = document.getElementById('message').value.trim();
            if (!text) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert("Сервер ещё не подключён");
                return;
            }

            const data = { nick, text };
            ws.send(JSON.stringify(data));
            document.getElementById('message').value = '';
        }

        document.getElementById('send').onclick = sendMessage;
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        connect();
    </script>
</body>
</html>
